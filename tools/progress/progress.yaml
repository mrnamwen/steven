# SMT:Imagine Client Reimplementation Progress
# ==============================================
# This file tracks decomp/reimplementation progress per subsystem.
#
# Numbers come from Ghidra analysis of ImagineClientOrig.exe (RU v1.666):
#   - Total functions: 122,153  (ghidra_stats.txt)
#   - RTTI classes: 2,181       (rtti_data.json)
#   - Virtual methods: 63,516   (client_architecture_map.txt)
#
# Function counts per subsystem are from ghidra_functions.txt named-function
# matching plus the RTTI virtual method counts from client_architecture_map.txt.
#
# To update: edit the 'done_functions' and 'done_classes' counts, and add
# entries to the 'completed' lists. Then run: python3 generate.py

project:
  name: "SMT:Imagine Client"
  binary: "ImagineClientOrig.exe"
  binary_size_bytes: 14680064
  total_functions: 122153
  total_classes: 2354
  total_vfuncs: 63516

# History entries for the timeline chart.
# Add a new entry each time you update progress.
history:
  - date: "2026-04-10"
    total_functions_done: 0
    total_classes_done: 178
    note: "Initial tracking. Gamebryo engine classes covered by source."

subsystems:
  # ----------------------------------------------------------------
  # Gamebryo Engine - covered by building from 2.3 source
  # RTTI: 178 Ni* classes in client, 5 RTTI classes with 57 vfuncs
  # Named functions: 39 Ni* in ghidra_functions.txt
  # The actual engine is ~30k-40k functions in the binary (statically linked).
  # We estimate ~38,000 based on the code section analysis.
  # ----------------------------------------------------------------
  gamebryo_engine:
    display_name: "Gamebryo Engine"
    description: "Ni*/NiDX9/NiInput/NiAnimation - building from 2.3 source"
    rtti_classes: 178
    total_classes: 178
    done_classes: 178
    # Estimated engine functions in the binary (statically linked Gamebryo)
    # 178 RTTI classes, ~39 named Ni* funcs visible, but most are unnamed.
    # Conservative estimate based on eval SDK lib symbol counts.
    total_functions: 38000
    done_functions: 38000
    status: "complete"
    notes: "Building from Gamebryo 2.3 full-license source. Client uses 2.1.1.1 but core APIs are stable."

  # ----------------------------------------------------------------
  # Network: recv handlers, send handlers, and network layer
  # From client_architecture_map.txt:
  #   Recv Handlers: 388 classes, 392 vfuncs
  #   Send Handlers: 120 classes, 240 vfuncs
  #   Network Layer: 302 classes, 620 vfuncs
  # From ghidra_functions.txt:
  #   MiRecv*: 412 named functions
  #   MiClientNetwork*: 963 named functions
  #   CiNetwork*: counted within the 963
  # ----------------------------------------------------------------
  recv_handlers:
